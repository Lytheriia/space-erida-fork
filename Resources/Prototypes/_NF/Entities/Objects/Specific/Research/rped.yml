- type: entity
  parent: BaseStorageItem
  id: RPED
  name: RPED
  suffix: Empty
  description: A Rapid Part Exchange Device, perfect for quickly upgrading machines.
  components:
  - type: Sprite
    sprite: _NF/Objects/Specific/Research/rped.rsi
    layers:
    - state: icon
    - state: icon-unshaded
      shader: unshaded
  - type: Item
    sprite: _NF/Objects/Specific/Research/rped.rsi
    inhandVisuals:
      left:
      - state: inhand-left
      - state: inhand-left-unshaded
        shader: unshaded
      right:
      - state: inhand-right
      - state: inhand-right-unshaded
        shader: unshaded
    size: Normal
  - type: PartExchanger
  - type: Storage
    grid:
    - 0,0,3,3 # Upstream (when it existed): 0,0,15,5 - area: 144 < 16
    quickInsert: true
    areaInsert: true
    whitelist:
      components:
      - MachinePart

- type: entity
  parent: [ RPED, StorageFillT2Parts ]
  id: RPEDT2Filled
  categories: [ DoNotMap ]
  suffix: DO NOT MAP, Filled, T2 parts

- type: entity
  parent: [ RPED, StorageFillT3Parts ]
  id: RPEDT3Filled
  categories: [ DoNotMap ]
  suffix: DO NOT MAP, Filled, T3 parts

- type: entity
  parent: [ RPED, StorageFillT4Parts ]
  id: RPEDT4Filled
  categories: [ DoNotMap ]
  suffix: DO NOT MAP, Filled, T4 parts
