  components:
    - type: Sprite
      sprite: _Erida/Objects/Weapons/Melee/golden_rapier.rsi
    - type: MeleeWeapon
      attackRate: 3
      damage:
        types:
          Piercing: 7.5
    - type: Item
      sprite: _Erida/Objects/Weapons/Melee/golden_rapier.rsi