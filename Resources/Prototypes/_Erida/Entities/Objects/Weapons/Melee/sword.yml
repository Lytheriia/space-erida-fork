- type: entity
  name: syndicate rapier
  parent: [ BaseSword, BaseSyndicateContraband ]
  id: SyndicateRapier
  description: A thin blade made of plastitanium with a diamond tip.
  components:
  - type: Sprite
    sprite: _Erida/Objects/Weapons/Melee/syndicate_rapier.rsi
  - type: DisarmMalus
    malus: 0.6
  - type: MeleeWeapon
    resistanceBypassWide: false
    wideAnimationRotation: -135
    angle: 0
    animation: WeaponArcThrust
    attackRate: 1.5
    damage:
      types:
        Piercing: 20
    resistanceBypass: true
    soundHit:
        path: /Audio/Weapons/bladeslice.ogg
  - type: Reflect
    reflectProb: 0.15
    spread: 90
  - type: Item
    sprite: _Erida/Objects/Weapons/Melee/syndicate_rapier.rsi
  - type: Tag
    tags:
    - SyndicateRapier

