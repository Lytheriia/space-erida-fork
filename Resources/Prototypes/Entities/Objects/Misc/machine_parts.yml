- type: entity
  id: BaseStockPart
  name: stock part
  parent: BaseItem
  description: What?
  abstract: true
  components:
    # handling sounds edit start
    - type: EmitSoundOnPickup
      sound:
        path: /Audio/_Erida/Items/handling/component_pickup.ogg
    - type: EmitSoundOnDrop
      sound:
        path: /Audio/_Erida/Items/handling/component_drop.ogg
    - type: EmitSoundOnLand
      sound:
        path: /Audio/_Erida/Items/handling/component_drop.ogg
    # handling sounds edit end
    - type: Sprite
      sprite: Objects/Misc/stock_parts.rsi
    - type: Item
      size: Tiny
    - type: Stack
      count: 1
    - type: Tag
      tags:
      - ConstructionMaterial

- type: entity
  id: MicroManipulatorStockPart
  name: basic manipulator # Frontier: modular machine part<basic manipulator
  parent: BaseStockPart
  description: A basic manipulator used in the construction of a variety of devices. # Frontier:
  suffix: Rating 1, Single # Frontier: Single
  components:
    - type: Sprite
      state: micro_mani
    - type: MachinePart # Frontier
      part: Manipulator # Frontier
      rating: 1 # Frontier
    - type: Stack
      stackType: Manipulator
