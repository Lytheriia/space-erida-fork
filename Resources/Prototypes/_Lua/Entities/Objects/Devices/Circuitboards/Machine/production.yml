- type: entity
  id: ThrusterLuaMachineCircuitboard
  parent: BaseMachineCircuitboard
  name: thruster luatech machine board
  categories: [HideSpawnMenu]
  suffix: Lua
  components:
  - type: Sprite
    sprite: _Lua/Objects/Misc/module.rsi
    state: ltthruster
  - type: MachineBoard
    prototype: ThrusterLua
    stackRequirements:
      Plasteel: 5
      PurCapacitor: 4

- type: entity
  id: OmnidirectionalThrusterMachineCircuitboard
  parent: BaseMachineCircuitboard
  name: omnidirectional thruster machine board
  categories: [HideSpawnMenu]
  suffix: Lua
  components:
  - type: Sprite
    sprite: _Lua/Objects/Misc/module.rsi
    state: ltthruster
  - type: MachineBoard
    prototype: OmniThrusterLua
    stackRequirements:
      Steel: 8
      PurCapacitor: 7

- type: entity
  id: ThrusterLuaBuildMachineCircuitboard
  parent: [ThrusterLuaMachineCircuitboard, BaseMachineCircuitboard]
  name: thruster luatech machine board
  suffix: Lua
  components:
  - type: MachineBoard
    prototype: ThrusterLuaBuild
    requirements:
      Capacitor: 4
    stackRequirements:
      Plasteel: 5
